source = ~/.config/hypr/modules/colors.conf

general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = /home/subhamjyoti/Wallpapers/current_wallpaper.png   # Use an absolute path to your wallpaper
    color = $bg_color
    blur_passes = 2 # 0 disables blurring
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = $accent_color
    inner_color = $bg_color
    font_color = $text_color
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(235, 219, 178, 1.0)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}
