# ---- KEYBINDS ----

# -- Mod Keys --
$mainMod = SUPER

# Terminal Related
bind = $mainMod, RETURN, exec, $terminal

# Kill Active Window
bind = $mainMod, Q, killactive,

# App Launcher
bind = $mainMod, D, exec, ~/.config/rofi/launchers/type-3/launcher.sh || pkill rofi

# Appearance Menu ( Theme, wallpaper, wallpaper transition, waybars, fonts )
bind = $mainMod, A, exec, pkill rofi || ~/.config/hypr/switchers/set-appearance.sh

# Waybar Switcher
bind = $mainMod SHIFT, W, exec, pkill rofi || ~/.config/hypr/switchers/set-waybar.sh

# Wallpaper Selector
bind = $mainMod, W, exec, pkill rofi || ~/.config/hypr/switchers/set-wallpaper.sh

# Wallpaper Transition Selector
bind = $mainMod ALT, W, exec, pkill rofi || ~/.config/hypr/switchers/set-wallpaper-transition.sh

# Custom Theme Switcher
bind = $mainMod, T, exec, pkill rofi || ~/.config/hypr/switchers/set-theme.sh

# Notification center
bind = $mainMod, N, exec, swaync-client -t

# Clipboard Menu
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu -display-columns 2 -p "Clipboard" -theme ~/.config/rofi/launchers/type-2/style-1.rasi | cliphist decode | wl-copy


# Browser
bind = $mainMod, B, exec, $browser

# File Manager
bind = $mainMod, E, exec, $fileManager

# Screen Recording Application
bind = $mainMod, KP_Insert, exec, obs

# Code Editor
bind = $mainMod, V, exec, $codeEditor

# Toggle layout of windows
bind = $mainMod, J, layoutmsg, togglesplit     # Toggles window layout
bind = $mainMod, F, togglefloating,

# Hyperlock
bind = $mainMod, L, exec, hyprlock

# Logout of hyprland while closing all the applications
bind = $mainMod CTRL, P, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

#Move focus of windows with arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, h, movefocus, l

bind = $mainMod, right, movefocus, r
bind = $mainMod, l, movefocus, r

bind = $mainMod, up, movefocus, u
bind = $mainMod, k, movefocus, u

bind = $mainMod, down, movefocus, d
bind = $mainMod, j, movefocus, d

# Swap Windows
bind = $mainMod ALT, left, swapwindow, l
bind = $mainMod ALT, right, swapwindow, r
bind = $mainMod ALT, up, swapwindow, u
bind = $mainMod ALT, down, swapwindow, d

# Maximize windows
bind = $mainMod, M, fullscreen, 1

# Fullscreen windows
bind = $mainMod SHIFT, F, fullscreen, 0

# Screenshot Keybinds
bind = , Print, exec, hyprshot -m region
bind = $mainMod, Print, exec, hyprshot -m window
bind = $mainMod SHIFT, Print, exec, hyprshot -m output -m eDP-1

# Toggle Waybar ON/OFF
bind = $mainMod CTRL, B, exec, ~/.config/waybar/scripts/launch.sh

# Toggle HyperPaper ON/OFF
bind = $mainMod CTRL, H, exec, pkill $wallpaperEngine || $wallpaperEngine

# Switching Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6 
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9 
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6 
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9 
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Toggle special Worskspace (Scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume 5
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume -5 
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, swayosd-client --brightness +10
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness -10

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


